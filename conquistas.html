<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEM · Conquistas</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/conquistas.css" />
</head>

<body class="conquistas-page">
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span></span> enem.study</div>
    <nav>
      <p class="nav-label">Menu</p>
      <ul class="nav-links">
        <li><a href="index.html"><i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard</a></li>
        <li><a href="hoje.html"><i data-lucide="play-circle" class="nav-icon"></i> Estudar Hoje</a></li>
        <li><a href="grade.html"><i data-lucide="calendar-days" class="nav-icon"></i> Grade Semanal</a></li>
        <li><a href="materias.html"><i data-lucide="book-open" class="nav-icon"></i> Matérias</a></li>
        <li><a href="conquistas.html"><i data-lucide="medal" class="nav-icon"></i> Conquistas</a></li>
        <li><a href="exportar.html"><i data-lucide="download" class="nav-icon"></i> Exportar</a></li>
        <li><a href="perfil.html"><i data-lucide="trophy" class="nav-icon"></i> Perfil</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <p class="date-tag">Coleção</p>
      <h1>Conquistas</h1>
      <p class="page-sub">Marcos visíveis para direcionar o estudo e segredos para manter a curiosidade viva.</p>
    </div>

    <div class="conquistas-shell">
      <section class="steam-overview" id="steam-overview">
        <div class="steam-overview-top">
          <div class="steam-overview-game">
            <div class="steam-game-cover">
              <i data-lucide="graduation-cap"></i>
            </div>
            <div class="steam-game-info">
              <p class="steam-kicker">Conquistas · ENEM Study</p>
              <h2 id="steam-title">—</h2>
              <p class="steam-sub" id="steam-sub">—</p>
            </div>
          </div>

          <button class="steam-demo-btn" id="simulate-btn" type="button">
            <i data-lucide="sparkles"></i>
            Simular conquista
          </button>
        </div>

        <div class="steam-progress-wrap">
          <div class="steam-progress-bar">
            <div class="steam-progress-fill" id="steam-progress-fill"></div>
          </div>
          <div class="steam-progress-meta">
            <span id="steam-progress-text">0 / 0</span>
            <span id="steam-progress-percent">0%</span>
          </div>
        </div>

        <div class="steam-tabs">
          <button class="steam-tab active" data-tab="unlocked" type="button">
            Minhas Conquistas <span class="steam-tab-count" id="count-unlocked">0</span>
          </button>
          <button class="steam-tab" data-tab="locked" type="button">
            Para Alcançar <span class="steam-tab-count" id="count-locked">0</span>
          </button>
          <button class="steam-tab" data-tab="secret" type="button">
            Secretas <span class="steam-tab-count" id="count-secret">0</span>
          </button>

          <label class="steam-search">
            <i data-lucide="search"></i>
            <input type="text" id="search-input" placeholder="Buscar conquista..." />
          </label>
        </div>
      </section>

      <section class="steam-panel" id="panel-unlocked">
        <div class="steam-list" id="list-unlocked"></div>
      </section>

      <section class="steam-panel hidden" id="panel-locked">
        <div class="steam-list" id="list-locked"></div>
      </section>

      <section class="steam-panel hidden" id="panel-secret">
        <div class="steam-list" id="list-secret"></div>
      </section>
    </div>
  </main>
</div>

<script src="data/topicos.js"></script>
<script src="data/conquistas.js"></script>
<script src="data/conquista_toast.js"></script>
<script src="js/app.js"></script>
<script src="js/conquistas.js"></script>
<script>
initConquistasPage()
</script>
</body>
</html>
