<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEM · Tópico</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 9px 16px; font-size: 13px; font-family: var(--font);
      background: none; border: none; color: var(--text2);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab i { width: 14px; height: 14px; }
    .tab:hover  { color: var(--text); }
    .tab.ativo  { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel  { display: none; }
    .tab-panel.ativo { display: block; }

    /* ── Hero do tópico ── */
    .topico-hero {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem 1.75rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .topico-hero-left { flex: 1; min-width: 0; }
    .topico-mat-tag {
      font-size: 11px; font-family: var(--mono); color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .topico-mat-tag i { width: 13px; height: 13px; }
    .topico-titulo { font-size: 20px; font-weight: 600; letter-spacing: -.02em; line-height: 1.3; }
    .topico-hero-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

    /* ── Check grande ── */
    .check-grande {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border2); background: var(--bg3);
      color: var(--text2); transition: all .15s;
    }
    .check-grande.feito {
      background: rgba(200,241,53,.12); border-color: rgba(200,241,53,.35);
      color: var(--accent);
    }
    .check-grande i { width: 14px; height: 14px; }

    /* ── Stats rápidos ── */
    .topico-stats {
      display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .tstat {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .65rem 1rem; font-family: var(--mono);
    }
    .tstat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
    .tstat-val { font-size: 16px; font-weight: 500; }

    /* ── Anotações ── */
    .anotacao-toolbar {
      display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .fmt-btn {
      padding: 4px 10px; font-size: 12px; font-family: var(--mono);
      border: 1px solid var(--border2); border-radius: 5px;
      background: none; color: var(--text3); cursor: pointer; transition: all .15s;
    }
    .fmt-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }

    /* ── Vídeos ── */
    .video-add-row {
      display: flex; gap: 8px; margin-bottom: 1rem;
    }
    .video-add-row input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 9px 12px;
      color: var(--text); font-family: var(--font); font-size: 13px; outline: none;
    }
    .video-add-row input:focus { border-color: var(--accent); }
    .video-add-row input::placeholder { color: var(--text3); }

    .videos-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .video-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
    }
    .video-thumb-wrap {
      position: relative; padding-bottom: 56.25%; background: #000;
    }
    .video-thumb-wrap iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .video-thumb-wrap .video-cover {
      position: absolute; inset: 0;
      background: var(--bg3); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .video-thumb-wrap .video-cover img {
      width: 100%; height: 100%; object-fit: cover; opacity: .7;
    }
    .video-cover-play {
      position: absolute;
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center;
    }
    .video-cover-play i { width: 22px; height: 22px; color: #fff; }
    .video-info {
      padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px;
    }
    .video-titulo { flex: 1; font-size: 12px; line-height: 1.4; color: var(--text2); }
    .video-del {
      background: none; border: none; color: var(--text3); cursor: pointer;
      padding: 2px; transition: color .15s; flex-shrink: 0;
    }
    .video-del:hover { color: var(--red); }
    .video-del i { width: 13px; height: 13px; }

    /* ── Questões ── */
    .questao-form {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .questao-form textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 9px 12px;
      color: var(--text); font-family: var(--font); font-size: 13px;
      line-height: 1.6; resize: vertical; outline: none; min-height: 80px;
    }
    .questao-form textarea:focus { border-color: var(--accent); }
    .questao-form textarea::placeholder { color: var(--text3); }
    .questao-form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .questao-form-row label { font-size: 11px; color: var(--text3); font-family: var(--mono); display: block; margin-bottom: 4px; }

    .questao-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 1rem 1.25rem;
      margin-bottom: 8px;
    }
    .questao-enunciado { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
    .questao-resposta-toggle {
      font-size: 12px; font-family: var(--mono); color: var(--accent);
      background: rgba(200,241,53,.08); border: 1px solid rgba(200,241,53,.2);
      border-radius: 5px; padding: 4px 10px; cursor: pointer;
      transition: all .15s;
    }
    .questao-resposta-toggle:hover { background: rgba(200,241,53,.15); }
    .questao-resposta {
      margin-top: 10px; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px; line-height: 1.6; color: var(--text2);
      display: none;
    }
    .questao-resposta.open { display: block; }
    .questao-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .questao-acerto {
      display: flex; gap: 6px;
    }
    .acerto-btn {
      font-size: 11px; padding: 3px 10px; border-radius: 4px;
      border: 1px solid var(--border2); background: none;
      color: var(--text3); cursor: pointer; font-family: var(--font); transition: all .15s;
    }
    .acerto-btn.certo.active   { background: rgba(74,222,128,.15); border-color: var(--green); color: var(--green); }
    .acerto-btn.errado.active  { background: rgba(255,94,94,.1);   border-color: var(--red);   color: var(--red);   }
    .questao-del {
      background: none; border: none; color: var(--text3); cursor: pointer;
      font-size: 11px; font-family: var(--mono); transition: color .15s;
    }
    .questao-del:hover { color: var(--red); }

    /* ── Obsidian ── */
    .obsidian-section { display: flex; flex-direction: column; gap: 12px; }
    .obsidian-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 1.25rem;
    }
    .obsidian-box h3 { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .obsidian-box p  { font-size: 12px; color: var(--text3); line-height: 1.6; margin-bottom: 10px; }
    .obsidian-vault-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .obsidian-vault-row input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 8px 12px;
      color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
    }
    .obsidian-vault-row input:focus { border-color: var(--accent); }
    .obsidian-import-area {
      width: 100%;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); padding: 9px 12px;
      color: var(--text); font-family: var(--mono); font-size: 12px;
      line-height: 1.6; resize: vertical; outline: none; min-height: 100px;
    }
    .obsidian-import-area:focus { border-color: var(--accent); }

    /* ── Timer flutuante (reutilizado do hoje.html) ── */
    .pomodoro-bar {
      position: fixed; bottom: 0; left: 220px; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      padding: 14px 2.5rem;
      display: flex; align-items: center; gap: 16px;
      z-index: 50;
      transform: translateY(100%);
      transition: transform .3s ease;
    }
    .pomodoro-bar.visible { transform: translateY(0); }
    .pomo-display {
      font-family: var(--mono); font-size: 24px; font-weight: 500;
      letter-spacing: .04em; min-width: 68px;
    }
    .pomo-display.work   { color: var(--accent); }
    .pomo-display.rest   { color: var(--blue); }
    .pomo-display.urgent { color: var(--red); }
    .pomo-label  { flex: 1; }
    .pomo-nome   { font-size: 13px; font-weight: 500; }
    .pomo-status { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
    .pomo-seg-selector { display: flex; gap: 4px; }
    .pomo-seg-btn {
      font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border2); background: none;
      color: var(--text3); cursor: pointer; font-family: var(--font); transition: all .15s;
    }
    .pomo-seg-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,241,53,.07); }

    /* ── botão universo na lista de topicos ── */
    .topico-universo-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 6px; border: 1px solid var(--border2);
      background: none; color: var(--text3);
      cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .topico-universo-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,241,53,.08); }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><span></span> enem.study</div>
    <nav>
      <p class="nav-label">Menu</p>
      <ul class="nav-links">
        <li><a href="index.html"><i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard</a></li>
        <li><a href="hoje.html"><i data-lucide="play-circle" class="nav-icon"></i> Estudar Hoje</a></li>
        <li><a href="grade.html"><i data-lucide="calendar-days" class="nav-icon"></i> Grade Semanal</a></li>
        <li><a href="materias.html"><i data-lucide="book-open" class="nav-icon"></i> Matérias</a></li>
        <li><a href="perfil.html"><i data-lucide="trophy" class="nav-icon"></i> Perfil</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main" id="main-content">
    <!-- Renderizado por JS -->
  </main>

</div>

<!-- Pomodoro flutuante -->
<div class="pomodoro-bar" id="pomo-bar">
  <div class="pomo-display work" id="pomo-display">25:00</div>
  <div class="pomo-label">
    <div class="pomo-nome" id="pomo-nome">—</div>
    <div class="pomo-status" id="pomo-status">Pronto para começar</div>
  </div>
  <div class="pomo-seg-selector" id="pomo-segs">
    <button class="pomo-seg-btn active" data-min="25" onclick="setPomoMin(25,this)">25min</button>
    <button class="pomo-seg-btn" data-min="50" onclick="setPomoMin(50,this)">50min</button>
  </div>
  <button class="btn btn-accent btn-sm" id="pomo-stop" onclick="pararPomo()">Parar</button>
</div>

<script src="data/topicos.js"></script>
<script src="js/app.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
// Resolver tópico via URL params
// ─────────────────────────────────────────────────────────────
const params     = new URLSearchParams(window.location.search)
const materiaKey = params.get('m')
const topicoId   = params.get('id')
const topicoIdx  = params.get('idx') !== null ? parseInt(params.get('idx')) : null

if (!materiaKey || !ENEM[materiaKey]) window.location.href = 'materias.html'

const mat = ENEM[materiaKey]

// Encontra o índice e o objeto do tópico
let idx = -1
let topicoObj = null

if (topicoId) {
  idx = mat.topicos.findIndex(t => (typeof t === 'object' ? t.id : null) === topicoId)
} else if (topicoIdx !== null) {
  idx = topicoIdx
}

if (idx === -1 || idx >= mat.topicos.length) window.location.href = `materia.html?m=${materiaKey}`
topicoObj = mat.topicos[idx]

const titulo = tituloTopico(topicoObj)
const tid    = idTopico(topicoObj) || `${materiaKey}-${idx}`

document.title = `ENEM · ${titulo}`

// ─────────────────────────────────────────────────────────────
// Storage keys específicos desse tópico
// ─────────────────────────────────────────────────────────────
const SK = {
  anotacao : `tuniv_anotacao_${tid}`,
  videos   : `tuniv_videos_${tid}`,
  questoes : `tuniv_questoes_${tid}`,
  vaultName: `obsidian_vault`,
}

function getAnotacaoTopico()      { return store.get(SK.anotacao)  || '' }
function saveAnotacaoTopico(txt)  { store.set(SK.anotacao, txt) }
function getVideos()              { return store.get(SK.videos)    || [] }
function saveVideos(v)            { store.set(SK.videos, v) }
function getQuestoes()            { return store.get(SK.questoes)  || [] }
function saveQuestoes(q)          { store.set(SK.questoes, q) }
function getVaultName()           { return store.get(SK.vaultName) || '' }
function saveVaultName(n)         { store.set(SK.vaultName, n) }

// ─────────────────────────────────────────────────────────────
// YouTube helpers
// ─────────────────────────────────────────────────────────────
function ytId(url) {
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/)
  return m ? m[1] : null
}
function ytThumb(id) { return `https://img.youtube.com/vi/${id}/mqdefault.jpg` }

async function ytTitulo(id) {
  try {
    const r = await fetch(`https://www.youtube.com/oembed?url=https://youtu.be/${id}&format=json`)
    if (r.ok) { const d = await r.json(); return d.title }
  } catch {}
  return 'Vídeo do YouTube'
}

// ─────────────────────────────────────────────────────────────
// Pomodoro
// ─────────────────────────────────────────────────────────────
let pomoInterval  = null
let pomoRestante  = 25 * 60
let pomoTotal     = 25 * 60
let pomoRodando   = false
let pomoMinutos   = 25
let pomoSessaoSeg = 0
let pomoSessaoInt = null

function setPomoMin(min, btn) {
  if (pomoRodando) return
  pomoMinutos = min
  pomoRestante = min * 60
  pomoTotal    = min * 60
  document.querySelectorAll('.pomo-seg-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  atualizarDisplayPomo()
}

function iniciarPomo() {
  if (pomoRodando) return
  pomoRodando = true
  document.getElementById('pomo-bar').classList.add('visible')
  document.getElementById('pomo-nome').textContent = titulo
  document.getElementById('pomo-status').textContent = 'Estudando...'
  document.getElementById('pomo-display').className = 'pomo-display work'

  // Cronômetro de sessão (conta pra cima)
  pomoSessaoSeg = 0
  clearInterval(pomoSessaoInt)
  pomoSessaoInt = setInterval(() => {
    pomoSessaoSeg++
    atualizarBadgeTempo()
  }, 1000)

  pomoInterval = setInterval(() => {
    pomoRestante--
    if (pomoRestante <= 0) {
      clearInterval(pomoInterval)
      pomoRodando = false
      // Salva tempo ao concluir o pomodoro
      const seg = pomoMinutos * 60
      addTempo(materiaKey, idx, seg)
      bumpStreak()
      document.getElementById('pomo-status').textContent = '✓ Pomodoro concluído!'
      document.getElementById('pomo-display').className = 'pomo-display rest'
      clearInterval(pomoSessaoInt)
      atualizarStatsTempo()
      return
    }
    const urgente = pomoRestante <= 60
    document.getElementById('pomo-display').className = 'pomo-display ' + (urgente ? 'urgent' : 'work')
    atualizarDisplayPomo()
  }, 1000)
}

function pararPomo() {
  clearInterval(pomoInterval)
  clearInterval(pomoSessaoInt)
  // Salva o tempo parcial que passou
  const parcial = pomoTotal - pomoRestante
  if (parcial > 0) {
    addTempo(materiaKey, idx, parcial)
    bumpStreak()
  }
  pomoRodando = false
  pomoRestante = pomoMinutos * 60
  document.getElementById('pomo-bar').classList.remove('visible')
  atualizarStatsTempo()
}

function atualizarDisplayPomo() {
  const m = Math.floor(pomoRestante / 60).toString().padStart(2,'0')
  const s = (pomoRestante % 60).toString().padStart(2,'0')
  document.getElementById('pomo-display').textContent = `${m}:${s}`
}

function atualizarBadgeTempo() {
  const el = document.getElementById('badge-sessao')
  if (el) el.textContent = formatTempo(pomoSessaoSeg)
}

function atualizarStatsTempo() {
  const t = getTempo(materiaKey, idx)
  const el = document.getElementById('tstat-tempo')
  if (el) el.textContent = t > 0 ? formatTempo(t) : '—'
}

// ─────────────────────────────────────────────────────────────
// Render principal
// ─────────────────────────────────────────────────────────────
function render() {
  const feitos = getTopicosFeitos(materiaKey)
  const feito  = feitos.includes(idx)
  const tempo  = getTempo(materiaKey, idx)
  const dific  = getDificuldades(materiaKey)
  const d      = dific[idx] || 0

  const total   = mat.topicos.length
  const pMatPct = Math.round((feitos.length / total) * 100)

  document.getElementById('main-content').innerHTML = `
    <a class="back-link" href="materia.html?m=${materiaKey}">
      <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> ${mat.nome}
    </a>

    <!-- Hero -->
    <div class="topico-hero">
      <div class="topico-hero-left">
        <div class="topico-mat-tag">
          <i data-lucide="${mat.icone}"></i> ${mat.nome} · tópico ${idx + 1} de ${total}
        </div>
        <div class="topico-titulo">${titulo}</div>
      </div>
      <div class="topico-hero-actions">
        <button class="check-grande ${feito ? 'feito' : ''}" id="check-grande" onclick="toggleFeito()">
          <i data-lucide="${feito ? 'check-circle-2' : 'circle'}"></i>
          ${feito ? 'Concluído' : 'Marcar como feito'}
        </button>
        <button class="btn btn-accent btn-sm" onclick="iniciarPomo()" id="btn-pomo">
          <i data-lucide="timer" style="width:14px;height:14px;"></i>
          Pomodoro
        </button>
      </div>
    </div>

    <!-- Stats rápidos -->
    <div class="topico-stats">
      <div class="tstat">
        <div class="tstat-lbl">Tempo nesse tópico</div>
        <div class="tstat-val accent" id="tstat-tempo" style="color:var(--blue);">${tempo > 0 ? formatTempo(tempo) : '—'}</div>
      </div>
      <div class="tstat">
        <div class="tstat-lbl">Sessão atual</div>
        <div class="tstat-val" id="badge-sessao" style="color:var(--accent);">—</div>
      </div>
      <div class="tstat">
        <div class="tstat-lbl">Dificuldade</div>
        <div class="tstat-val" id="tstat-dific" style="color:${d===1?'var(--red)':d===2?'var(--amber)':'var(--green)'};">
          ${d===1?'😕 Difícil':d===2?'😐 Médio':d===3?'😊 Tranquilo':'—'}
        </div>
      </div>
      <div class="tstat">
        <div class="tstat-lbl">Progresso da matéria</div>
        <div class="tstat-val">${pMatPct}%</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab ativo" onclick="mudarTab('anotacoes',this)">
        <i data-lucide="pencil-line"></i> Anotações
      </button>
      <button class="tab" onclick="mudarTab('videos',this)">
        <i data-lucide="youtube"></i> Vídeos
      </button>
      <button class="tab" onclick="mudarTab('questoes',this)">
        <i data-lucide="clipboard-list"></i> Questões
      </button>
      <button class="tab" onclick="mudarTab('obsidian',this)">
        <i data-lucide="app-window"></i> Obsidian
      </button>
    </div>

    <!-- ── Tab: Anotações ── -->
    <div class="tab-panel ativo" id="tab-anotacoes">
      <div class="anotacao-toolbar">
        <button class="fmt-btn" onclick="fmtInsert('**','**')"><b>B</b></button>
        <button class="fmt-btn" onclick="fmtInsert('*','*')"><i>I</i></button>
        <button class="fmt-btn" onclick="fmtInsert('## ','')">H2</button>
        <button class="fmt-btn" onclick="fmtInsert('### ','')">H3</button>
        <button class="fmt-btn" onclick="fmtInsert('- ','')">Lista</button>
        <button class="fmt-btn" onclick="fmtInsert('\`','`')">Code</button>
        <button class="fmt-btn" onclick="fmtInsert('> ','')">Citar</button>
        <button class="fmt-btn" onclick="fmtInsert('---\n','')">Linha</button>
        <span style="flex:1;"></span>
        <span style="font-size:11px;color:var(--text3);font-family:var(--mono);align-self:center;" id="save-status"></span>
      </div>
      <textarea class="anotacao-area" id="anotacao" style="min-height:260px;"
        placeholder="Escreva suas anotações, fórmulas, resumos... (suporta Markdown)&#10;&#10;Dicas rápidas:&#10;## Título&#10;**negrito**, *itálico*, \`código\`&#10;- item de lista"
      >${getAnotacaoTopico()}</textarea>
    </div>

    <!-- ── Tab: Vídeos ── -->
    <div class="tab-panel" id="tab-videos">
      <div class="video-add-row">
        <input type="url" id="yt-input" placeholder="Cole o link do YouTube aqui...">
        <button class="btn btn-accent btn-sm" onclick="adicionarVideo()">
          <i data-lucide="plus" style="width:14px;height:14px;"></i> Salvar
        </button>
      </div>
      <div class="videos-grid" id="videos-grid"></div>
      <p id="videos-empty" style="color:var(--text3);font-size:13px;display:none;">
        Nenhum vídeo salvo ainda. Cole um link do YouTube acima.
      </p>
    </div>

    <!-- ── Tab: Questões ── -->
    <div class="tab-panel" id="tab-questoes">
      <div class="questao-form" id="questao-form">
        <div class="questao-form-row">
          <div style="flex:1;">
            <label>Enunciado / Questão</label>
            <textarea id="q-enunciado" placeholder="Cole ou escreva o enunciado da questão..."></textarea>
          </div>
        </div>
        <div class="questao-form-row">
          <div style="flex:1;">
            <label>Resposta / Gabarito</label>
            <textarea id="q-resposta" placeholder="Gabarito, resolução ou comentário..." style="min-height:60px;"></textarea>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-accent btn-sm" onclick="salvarQuestao()">
            <i data-lucide="plus" style="width:14px;height:14px;"></i> Adicionar questão
          </button>
        </div>
      </div>
      <div id="questoes-list"></div>
      <p id="questoes-empty" style="color:var(--text3);font-size:13px;display:none;">
        Nenhuma questão salva ainda.
      </p>
    </div>

    <!-- ── Tab: Obsidian ── -->
    <div class="tab-panel" id="tab-obsidian">
      <div class="obsidian-section">

        <div class="obsidian-box">
          <h3>⚙️ Configuração do Vault</h3>
          <p>Digite o nome exato do seu vault no Obsidian para os links funcionarem.</p>
          <div class="obsidian-vault-row">
            <input type="text" id="vault-name" value="${getVaultName()}" placeholder="Ex: ENEM-Study">
            <button class="btn btn-sm" onclick="salvarVault()">Salvar</button>
          </div>
        </div>

        <div class="obsidian-box">
          <h3>🔗 Abrir no Obsidian</h3>
          <p>Abre ou cria a nota correspondente direto no seu Obsidian. Precisa do vault configurado acima e o app instalado.</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-sm" onclick="abrirObsidian()">
              <i data-lucide="external-link" style="width:13px;height:13px;"></i> Abrir nota
            </button>
            <button class="btn btn-sm btn-accent" onclick="criarObsidian()">
              <i data-lucide="file-plus" style="width:13px;height:13px;"></i> Criar/atualizar nota
            </button>
          </div>
          <p style="margin-top:8px;margin-bottom:0;font-size:11px;color:var(--text3);">
            "Criar/atualizar" usa o plugin <strong>Advanced URI</strong>. Instale no Obsidian para funcionar.
          </p>
        </div>

        <div class="obsidian-box">
          <h3>📥 Importar do Obsidian</h3>
          <p>Cole o conteúdo da sua nota do Obsidian abaixo. O texto vai substituir suas anotações nesse tópico.</p>
          <textarea class="obsidian-import-area" id="obsidian-import"
            placeholder="Cole o conteúdo Markdown da nota aqui..."></textarea>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="btn btn-sm btn-accent" onclick="importarObsidian()">↓ Importar para anotações</button>
            <button class="btn btn-sm" onclick="document.getElementById('obsidian-import').value=''">Limpar</button>
          </div>
        </div>

        <div class="obsidian-box">
          <h3>📤 Exportar universo completo</h3>
          <p>Baixa um arquivo <code>.md</code> com tudo: frontmatter, anotações, vídeos, questões e imagens — pronto para jogar no seu vault.</p>
          <button class="btn btn-accent btn-sm" onclick="exportarMD()">
            <i data-lucide="download" style="width:13px;height:13px;"></i> Baixar .md
          </button>
        </div>

      </div>
    </div>
  `

  // Listeners pós-render
  setupAnotacaoListener()
  renderVideos()
  renderQuestoes()
  lucide.createIcons()
}

// ─────────────────────────────────────────────────────────────
// Tabs
// ─────────────────────────────────────────────────────────────
function mudarTab(nome, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'))
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('ativo'))
  btn.classList.add('ativo')
  document.getElementById('tab-' + nome).classList.add('ativo')
}

// ─────────────────────────────────────────────────────────────
// Check feito
// ─────────────────────────────────────────────────────────────
function toggleFeito() {
  const feitos = toggleTopico(materiaKey, idx)
  const feito  = feitos.includes(idx)
  const btn    = document.getElementById('check-grande')
  if (!btn) return
  btn.className = 'check-grande ' + (feito ? 'feito' : '')
  btn.innerHTML = `<i data-lucide="${feito ? 'check-circle-2' : 'circle'}"></i> ${feito ? 'Concluído' : 'Marcar como feito'}`
  lucide.createIcons()
}

// ─────────────────────────────────────────────────────────────
// Anotações
// ─────────────────────────────────────────────────────────────
let saveTimer = null
function setupAnotacaoListener() {
  const ta = document.getElementById('anotacao')
  if (!ta) return
  ta.addEventListener('input', () => {
    clearTimeout(saveTimer)
    const s = document.getElementById('save-status')
    if (s) s.textContent = 'salvando...'
    saveTimer = setTimeout(() => {
      saveAnotacaoTopico(ta.value)
      if (s) { s.textContent = 'salvo ✓'; setTimeout(() => { if (s) s.textContent = '' }, 2000) }
    }, 800)
  })
}

function fmtInsert(antes, depois) {
  const ta = document.getElementById('anotacao')
  if (!ta) return
  const start = ta.selectionStart, end = ta.selectionEnd
  const sel   = ta.value.substring(start, end)
  const novo  = ta.value.substring(0, start) + antes + sel + depois + ta.value.substring(end)
  ta.value    = novo
  ta.setSelectionRange(start + antes.length, end + antes.length)
  ta.focus()
  saveAnotacaoTopico(ta.value)
}

// ─────────────────────────────────────────────────────────────
// Vídeos
// ─────────────────────────────────────────────────────────────
async function adicionarVideo() {
  const input = document.getElementById('yt-input')
  const url   = input.value.trim()
  if (!url) return
  const id = ytId(url)
  if (!id) { alert('Link do YouTube inválido. Use youtube.com/watch?v=... ou youtu.be/...'); return }
  const btn = document.querySelector('.video-add-row .btn')
  btn.textContent = 'Buscando...'
  btn.disabled = true
  const titulo_yt = await ytTitulo(id)
  btn.innerHTML = '<i data-lucide="plus" style="width:14px;height:14px;"></i> Salvar'
  btn.disabled = false
  const videos = getVideos()
  videos.push({ id, titulo: titulo_yt, url })
  saveVideos(videos)
  input.value = ''
  renderVideos()
  lucide.createIcons()
}

function renderVideos() {
  const grid  = document.getElementById('videos-grid')
  const empty = document.getElementById('videos-empty')
  if (!grid) return
  const videos = getVideos()
  if (videos.length === 0) {
    grid.innerHTML = ''
    if (empty) empty.style.display = 'block'
    return
  }
  if (empty) empty.style.display = 'none'
  grid.innerHTML = videos.map((v, i) => `
    <div class="video-card">
      <div class="video-thumb-wrap">
        <div class="video-cover" id="cover-${i}" onclick="playVideo(${i})">
          <img src="${ytThumb(v.id)}" alt="${v.titulo}">
          <div class="video-cover-play"><i data-lucide="play" style="width:22px;height:22px;color:#fff;"></i></div>
        </div>
        <div id="player-${i}" style="display:none;position:absolute;inset:0;"></div>
      </div>
      <div class="video-info">
        <span class="video-titulo">${v.titulo}</span>
        <button class="video-del" onclick="removerVideo(${i})" title="Remover">
          <i data-lucide="x"></i>
        </button>
      </div>
    </div>
  `).join('')
  lucide.createIcons()
}

function playVideo(i) {
  const v    = getVideos()[i]
  const cover  = document.getElementById('cover-' + i)
  const player = document.getElementById('player-' + i)
  if (!cover || !player) return
  cover.style.display = 'none'
  player.style.display = 'block'
  player.innerHTML = `<iframe src="https://www.youtube.com/embed/${v.id}?autoplay=1" allowfullscreen allow="autoplay" style="position:absolute;inset:0;width:100%;height:100%;border:none;"></iframe>`
}

function removerVideo(i) {
  const videos = getVideos()
  videos.splice(i, 1)
  saveVideos(videos)
  renderVideos()
}

// ─────────────────────────────────────────────────────────────
// Questões
// ─────────────────────────────────────────────────────────────
function salvarQuestao() {
  const enunciado = document.getElementById('q-enunciado').value.trim()
  const resposta  = document.getElementById('q-resposta').value.trim()
  if (!enunciado) return
  const questoes = getQuestoes()
  questoes.push({ enunciado, resposta, acerto: null, data: new Date().toISOString() })
  saveQuestoes(questoes)
  document.getElementById('q-enunciado').value = ''
  document.getElementById('q-resposta').value  = ''
  renderQuestoes()
}

function renderQuestoes() {
  const list  = document.getElementById('questoes-list')
  const empty = document.getElementById('questoes-empty')
  if (!list) return
  const questoes = getQuestoes()
  if (questoes.length === 0) {
    list.innerHTML = ''
    if (empty) empty.style.display = 'block'
    return
  }
  if (empty) empty.style.display = 'none'
  list.innerHTML = questoes.map((q, i) => `
    <div class="questao-item">
      <div class="questao-enunciado">${q.enunciado.replace(/\n/g,'<br>')}</div>
      ${q.resposta ? `
        <button class="questao-resposta-toggle" onclick="toggleResposta(${i})">Ver resposta</button>
        <div class="questao-resposta" id="qresp-${i}">${q.resposta.replace(/\n/g,'<br>')}</div>
      ` : ''}
      <div class="questao-footer">
        <div class="questao-acerto">
          <button class="acerto-btn certo ${q.acerto===true  ?'active':''}" onclick="marcarAcerto(${i},true)">✓ Acertei</button>
          <button class="acerto-btn errado ${q.acerto===false ?'active':''}" onclick="marcarAcerto(${i},false)">✗ Errei</button>
        </div>
        <button class="questao-del" onclick="deletarQuestao(${i})">remover</button>
      </div>
    </div>
  `).join('')
}

function toggleResposta(i) {
  const el = document.getElementById('qresp-' + i)
  if (el) el.classList.toggle('open')
}

function marcarAcerto(i, val) {
  const questoes  = getQuestoes()
  questoes[i].acerto = questoes[i].acerto === val ? null : val
  saveQuestoes(questoes)
  renderQuestoes()
}

function deletarQuestao(i) {
  const questoes = getQuestoes()
  questoes.splice(i, 1)
  saveQuestoes(questoes)
  renderQuestoes()
}

// ─────────────────────────────────────────────────────────────
// Obsidian
// ─────────────────────────────────────────────────────────────
function salvarVault() {
  const v = document.getElementById('vault-name').value.trim()
  saveVaultName(v)
  alert(`Vault "${v}" salvo!`)
}

function obsidianPath() {
  return `${mat.nome}/${titulo}`
}

function abrirObsidian() {
  const vault = getVaultName()
  if (!vault) { alert('Configure o nome do vault primeiro.'); return }
  const path = encodeURIComponent(obsidianPath())
  window.location.href = `obsidian://open?vault=${encodeURIComponent(vault)}&file=${path}`
}

function criarObsidian() {
  const vault = getVaultName()
  if (!vault) { alert('Configure o nome do vault primeiro.'); return }
  const content  = gerarMarkdown()
  const path     = encodeURIComponent(obsidianPath())
  const conteudo = encodeURIComponent(content)
  // Advanced URI plugin: cria/atualiza a nota com o conteúdo
  window.location.href = `obsidian://advanced-uri?vault=${encodeURIComponent(vault)}&filepath=${path}.md&data=${conteudo}&mode=overwrite`
}

function importarObsidian() {
  const conteudo = document.getElementById('obsidian-import').value.trim()
  if (!conteudo) return
  if (!confirm('Isso vai substituir suas anotações atuais nesse tópico. Continuar?')) return
  const ta = document.getElementById('anotacao')
  if (ta) {
    ta.value = conteudo
    saveAnotacaoTopico(conteudo)
    const s = document.getElementById('save-status')
    if (s) { s.textContent = 'importado ✓'; setTimeout(() => { if (s) s.textContent = '' }, 2000) }
  }
  document.getElementById('obsidian-import').value = ''
}

function gerarMarkdown() {
  const feitos   = getTopicosFeitos(materiaKey)
  const feito    = feitos.includes(idx)
  const tempo    = getTempo(materiaKey, idx)
  const videos   = getVideos()
  const questoes = getQuestoes()
  const anotacao = getAnotacaoTopico()
  const hoje     = new Date().toISOString().slice(0,10)

  let md = `---\n`
  md += `materia: "${mat.nome}"\n`
  md += `topico: "${titulo}"\n`
  md += `id: "${tid}"\n`
  md += `concluido: ${feito}\n`
  md += `tempo_estudado: "${tempo > 0 ? formatTempo(tempo) : '0'}"\n`
  md += `ultima_exportacao: "${hoje}"\n`
  md += `tags: [enem, ${materiaKey}]\n`
  md += `---\n\n`
  md += `# ${titulo}\n\n`
  md += `> Matéria: **${mat.nome}** | Status: ${feito ? '✅ Concluído' : '⬜ Pendente'} | Tempo: ${tempo > 0 ? formatTempo(tempo) : '—'}\n\n`

  if (anotacao) {
    md += `## Anotações\n\n${anotacao}\n\n`
  }

  if (videos.length > 0) {
    md += `## Vídeos\n\n`
    videos.forEach(v => {
      md += `- [${v.titulo}](${v.url})\n`
    })
    md += '\n'
  }

  if (questoes.length > 0) {
    md += `## Questões\n\n`
    questoes.forEach((q, i) => {
      md += `### Questão ${i + 1}\n\n`
      md += `${q.enunciado}\n\n`
      if (q.resposta) {
        md += `**Resposta:** ${q.resposta}\n\n`
      }
      if (q.acerto !== null) {
        md += `**Resultado:** ${q.acerto ? '✓ Acertei' : '✗ Errei'}\n\n`
      }
    })
  }

  return md
}

function exportarMD() {
  const md       = gerarMarkdown()
  const nomeArq  = `${materiaKey}-${tid}.md`.replace(/[^a-z0-9\-_.]/gi, '_')
  const blob     = new Blob([md], { type: 'text/markdown;charset=utf-8' })
  const url      = URL.createObjectURL(blob)
  const a        = document.createElement('a')
  a.href         = url
  a.download     = nomeArq
  a.click()
  URL.revokeObjectURL(url)
}

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  render()
  setNavActive()
})
</script>
