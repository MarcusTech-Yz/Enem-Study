<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEM · Tópico</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .topico-shell { display: flex; flex-direction: column; gap: 1rem; }
    .topico-hero,
    .topico-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .topico-hero {
      padding: 1.4rem 1.6rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
    }
    .topico-meta { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .topico-tag {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      letter-spacing: .08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topico-title {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -.03em;
    }
    .topico-desc {
      color: var(--text2);
      font-size: 13px;
      max-width: 70ch;
    }
    .topico-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .topico-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .tstat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
    }
    .tstat-lbl {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .tstat-val { font-size: 16px; font-weight: 500; }
    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab.ativo {
      border-color: rgba(200,241,53,.24);
      color: var(--accent);
      background: rgba(200,241,53,.06);
    }
    .tab-panel { display: none; }
    .tab-panel.ativo { display: block; }
    .topico-card { padding: 1.2rem 1.3rem; }
    .editor-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: .8rem;
      flex-wrap: wrap;
    }
    .anotacao-area,
    .questao-form textarea,
    .video-input,
    .obsidian-import-area {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
    }
    .anotacao-area,
    .questao-form textarea,
    .obsidian-import-area {
      padding: 12px 14px;
      min-height: 160px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
    }
    .video-input {
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 13px;
    }
    .anotacao-area:focus,
    .questao-form textarea:focus,
    .video-input:focus,
    .obsidian-import-area:focus {
      border-color: var(--accent);
    }
    .video-add-row,
    .obsidian-vault-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: .9rem;
    }
    .video-add-row input,
    .obsidian-vault-row input { flex: 1; min-width: 220px; }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .video-card,
    .questao-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .video-card iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }
    .video-info,
    .questao-item {
      padding: 12px;
    }
    .video-info {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .video-title { font-size: 12px; color: var(--text2); }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px;
    }
    .icon-btn:hover { color: var(--red); }
    .questao-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
    .questao-enunciado { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
    .questao-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .obsidian-section { display: flex; flex-direction: column; gap: 12px; }
    .obsidian-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    .obsidian-box h3 { font-size: 14px; margin-bottom: 6px; }
    .obsidian-box p { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .save-status {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }
    .empty-state {
      color: var(--text3);
      font-size: 13px;
      padding: 12px 0;
    }
    @media (max-width: 900px) {
      .topico-hero {
        flex-direction: column;
      }
      .topico-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
