<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml" />
  <title>ENEM · Tópico</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    .topico-shell { display: flex; flex-direction: column; gap: 1rem; }
    .topico-hero,
    .topico-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .topico-hero {
      padding: 1.4rem 1.6rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
    }
    .topico-meta { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .topico-tag {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      letter-spacing: .08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topico-title {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -.03em;
    }
    .topico-desc {
      color: var(--text2);
      font-size: 13px;
      max-width: 70ch;
    }
    .topico-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .topico-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .tstat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
    }
    .tstat-lbl {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .tstat-val { font-size: 16px; font-weight: 500; }
    .mastery-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .mastery-btn {
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .mastery-btn:hover {
      background: var(--bg3);
      color: var(--text);
      transform: translateY(-1px);
    }
    .mastery-btn.d1.active {
      color: var(--red);
      border-color: rgba(255,94,94,.45);
      background: rgba(255,94,94,.08);
    }
    .mastery-btn.d2.active {
      color: var(--amber);
      border-color: rgba(245,166,35,.45);
      background: rgba(245,166,35,.08);
    }
    .mastery-btn.d3.active {
      color: var(--green);
      border-color: rgba(74,222,128,.45);
      background: rgba(74,222,128,.08);
    }
    .mastery-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      width: fit-content;
    }
    .mastery-badge.none {
      color: var(--text3);
      border: 1px solid var(--border2);
      background: var(--bg3);
    }
    .mastery-badge.d1 {
      color: var(--red);
      border: 1px solid rgba(255,94,94,.35);
      background: rgba(255,94,94,.08);
    }
    .mastery-badge.d2 {
      color: var(--amber);
      border: 1px solid rgba(245,166,35,.35);
      background: rgba(245,166,35,.08);
    }
    .mastery-badge.d3 {
      color: var(--green);
      border: 1px solid rgba(74,222,128,.35);
      background: rgba(74,222,128,.08);
    }
    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .tab.ativo {
      border-color: rgba(200,241,53,.24);
      color: var(--accent);
      background: rgba(200,241,53,.06);
    }
    .tab-panel { display: none; }
    .tab-panel.ativo { display: block; }
    .topico-card { padding: 1.2rem 1.3rem; }
    .editor-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: .8rem;
      flex-wrap: wrap;
    }
    .note-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .note-tool {
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      font-family: var(--font);
      cursor: pointer;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .note-tool:hover {
      color: var(--accent);
      border-color: rgba(200,241,53,.35);
      background: rgba(200,241,53,.06);
    }
    .note-tool.primary {
      color: var(--accent);
      border-color: rgba(200,241,53,.28);
      background: rgba(200,241,53,.06);
    }
    .note-toolbar-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 2px;
    }
    .note-helper {
      color: var(--text3);
      font-size: 11px;
      font-family: var(--mono);
      margin-top: 8px;
    }
    .anotacao-area,
    .questao-form textarea,
    .video-input,
    .obsidian-import-area {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      outline: none;
    }
    .anotacao-area,
    .questao-form textarea,
    .obsidian-import-area {
      padding: 12px 14px;
      min-height: 160px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
    }
    .video-input {
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 13px;
    }
    .anotacao-area:focus,
    .questao-form textarea:focus,
    .video-input:focus,
    .obsidian-import-area:focus {
      border-color: var(--accent);
    }
    .video-add-row,
    .obsidian-vault-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: .9rem;
    }
    .video-add-row input,
    .obsidian-vault-row input { flex: 1; min-width: 220px; }
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .video-card,
    .questao-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .video-card iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      display: block;
    }
    .video-info,
    .questao-item {
      padding: 12px;
    }
    .video-info {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .video-title { font-size: 12px; color: var(--text2); }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      padding: 2px;
    }
    .icon-btn:hover { color: var(--red); }
    .questao-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
    .questao-enunciado { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
    .questao-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .practice-card {
      background:
        linear-gradient(135deg, rgba(200,241,53,.08), rgba(96,165,250,.04)),
        var(--bg3);
      border: 1px solid rgba(200,241,53,.18);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }
    .practice-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .practice-kicker {
      color: var(--text3);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .practice-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .practice-title i { color: var(--accent); }
    .practice-sub { color: var(--text2); font-size: 12px; }
    .practice-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 11px;
      background: rgba(15,15,15,.25);
    }
    .quiz-shell {
      display: none;
      margin-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 1rem;
    }
    .quiz-shell.open { display: block; }
    .quiz-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .quiz-progress-text {
      color: var(--text3);
      font-family: var(--mono);
      font-size: 11px;
    }
    .quiz-question {
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 12px;
    }
    .quiz-options { display: grid; gap: 8px; }
    .quiz-option {
      width: 100%;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: flex-start;
      text-align: left;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--font);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .quiz-option:hover { border-color: var(--border2); background: var(--bg4); }
    .quiz-option:disabled { cursor: default; opacity: 1; }
    .quiz-option.correct { border-color: rgba(74,222,128,.5); background: rgba(74,222,128,.09); }
    .quiz-option.wrong { border-color: rgba(255,94,94,.5); background: rgba(255,94,94,.08); }
    .quiz-letter {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      color: var(--text2);
      font-family: var(--mono);
      font-size: 12px;
      border: 1px solid var(--border2);
    }
    .quiz-option.correct .quiz-letter { color: #0f0f0f; background: var(--green); border-color: var(--green); }
    .quiz-option.wrong .quiz-letter { color: #0f0f0f; background: var(--red); border-color: var(--red); }
    .quiz-feedback {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: var(--bg2);
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.6;
    }
    .quiz-feedback.open { display: block; }
    .quiz-feedback.correct { border-color: rgba(74,222,128,.35); }
    .quiz-feedback.wrong { border-color: rgba(255,94,94,.35); }
    .quiz-result {
      display: none;
      margin-top: 12px;
      padding: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .quiz-result.open { display: block; }
    .quiz-result strong { color: var(--accent); }
    .manual-questions {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .manual-questions summary {
      cursor: pointer;
      color: var(--text2);
      font-size: 12px;
      font-family: var(--mono);
    }
    .manual-questions[open] summary { margin-bottom: 12px; }
    .quiz-math { overflow-x: auto; }
    .quiz-math .katex { color: var(--text); }
    .obsidian-section { display: flex; flex-direction: column; gap: 12px; }
    .obsidian-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem;
    }
    .obsidian-box h3 { font-size: 14px; margin-bottom: 6px; }
    .obsidian-box p { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .save-status {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }
    .empty-state {
      color: var(--text3);
      font-size: 13px;
      padding: 12px 0;
    }
    @media (max-width: 900px) {
      .topico-hero {
        flex-direction: column;
      }
      .topico-actions {
        justify-content: flex-start;
      }
      .practice-head,
      .quiz-topbar {
        align-items: stretch;
      }
      .practice-head .btn,
      .quiz-topbar .btn {
        justify-content: center;
      }
    }
  </style>
</head>

<script src="data/conquistas.js"></script>
