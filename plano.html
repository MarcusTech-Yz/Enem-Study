<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml" />
  <title>ENEM · Plano</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .plan-page { display: flex; flex-direction: column; gap: 1.25rem; }
    .plan-config-card,
    .plan-radar-card,
    .today-plan,
    .week-panel,
    .priority-queue {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .plan-config-card {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 1rem;
      align-items: end;
    }
    .config-field { display: grid; gap: 6px; }
    .config-label {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-family: var(--mono);
    }
    .config-select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      border-radius: var(--radius-sm);
      padding: 9px 10px;
      outline: none;
    }
    .config-select:focus { border-color: var(--accent); }
    .plan-radar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .plan-radar-card { padding: 1rem; }
    .plan-radar-card span {
      display: block;
      color: var(--text3);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-family: var(--mono);
    }
    .plan-radar-card strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      margin: 9px 0 5px;
      color: var(--text);
    }
    .plan-radar-card small { color: var(--text2); font-size: 12px; }
    .plan-radar-card.weak { border-color: rgba(255,94,94,.38); }
    .plan-radar-card.review { border-color: rgba(168,85,247,.35); }
    .plan-radar-card.unstarted { border-color: rgba(96,165,250,.32); }
    .today-plan { padding: 1.2rem; }
    .today-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .today-header span,
    .section-kicker {
      color: var(--text3);
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .today-header h2 { font-size: 20px; margin-top: 4px; letter-spacing: -.02em; }
    .today-timeline { display: grid; gap: 12px; }
    .today-session {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .session-index {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #101010;
      font-weight: 800;
      font-family: var(--mono);
    }
    .session-meta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 10px;
      margin-bottom: 5px;
    }
    .session-content h3 {
      font-size: 15px;
      margin-bottom: 5px;
      line-height: 1.35;
    }
    .session-content p {
      color: var(--text2);
      line-height: 1.55;
      font-size: 12px;
    }
    .session-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .plan-focus-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) 360px;
      gap: 1rem;
      align-items: start;
    }
    .week-panel,
    .priority-queue { padding: 1rem; }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .section-title h2 { font-size: 17px; letter-spacing: -.02em; }
    .week-board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .week-day {
      min-height: 150px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
    }
    .week-day.today { border-color: var(--accent); }
    .week-day-name {
      color: var(--text3);
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 8px;
    }
    .week-day.today .week-day-name { color: var(--accent); }
    .week-session {
      display: block;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      background: rgba(255,255,255,.018);
    }
    .week-session strong {
      display: block;
      font-size: 11px;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .week-session span {
      display: block;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 9px;
    }
    .urgency-chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-family: var(--mono);
      border: 1px solid var(--border);
    }
    .urgency-chip.critica {
      color: #ff6b6b;
      background: rgba(255,94,94,.08);
      border-color: rgba(255,94,94,.25);
    }
    .urgency-chip.alta {
      color: #f59e0b;
      background: rgba(245,158,11,.08);
      border-color: rgba(245,158,11,.25);
    }
    .urgency-chip.media,
    .urgency-chip.prioritario {
      color: #60a5fa;
      background: rgba(96,165,250,.08);
      border-color: rgba(96,165,250,.25);
    }
    .urgency-chip.baixa {
      color: var(--text3);
      background: var(--bg3);
    }
    .priority-copy {
      color: var(--text2);
      font-size: 12px;
      line-height: 1.5;
      margin: 4px 0 12px;
    }
    .priority-list { display: grid; gap: 8px; }
    .priority-item {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      background: var(--bg3);
    }
    .priority-item:hover { border-color: rgba(200,241,53,.35); }
    .priority-item strong {
      display: block;
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 5px;
    }
    .priority-item span {
      display: block;
      color: var(--text3);
      font-family: var(--mono);
      font-size: 10px;
    }
    .priority-item small {
      display: block;
      color: var(--text2);
      font-size: 11px;
      line-height: 1.45;
      margin-top: 6px;
    }
    .empty-plan {
      color: var(--text3);
      font-size: 13px;
      padding: 1rem 0;
    }
    @media (max-width: 1100px) {
      .plan-config-card,
      .plan-radar,
      .week-board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .plan-focus-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .plan-config-card,
      .plan-radar,
      .week-board { grid-template-columns: 1fr; }
      .today-header { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span></span> enem.study</div>
    <nav>
      <p class="nav-label">Menu</p>
      <ul class="nav-links">
        <li><a href="index.html"><i data-lucide="play-circle" class="nav-icon"></i> Estudar</a></li>
        <li><a href="progresso.html"><i data-lucide="bar-chart-2" class="nav-icon"></i> Progresso</a></li>
        <li><a href="plano.html" class="active"><i data-lucide="calendar-days" class="nav-icon"></i> Plano</a></li>
        <li><a href="perfil.html"><i data-lucide="trophy" class="nav-icon"></i> Perfil</a></li>
      </ul>
    </nav>
    <div style="margin-top:auto;padding-top:1rem;display:flex;flex-direction:column;gap:4px;">
      <a href="materias.html" style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;padding:6px 0;">
        <i data-lucide="book-open" style="width:13px;height:13px;"></i> Todas as materias
      </a>
      <a href="exportar.html" style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;padding:6px 0;">
        <i data-lucide="download" style="width:13px;height:13px;"></i> Exportar dados
      </a>
    </div>
  </aside>

  <main class="main plan-page">
    <div class="page-header">
      <p class="date-tag">Planejamento inteligente</p>
      <h1>Seu Plano de Estudos</h1>
      <p>Recalculado por domínio, revisões, tempo real e equilíbrio entre áreas.</p>
    </div>

    <section class="plan-config-card">
      <label class="config-field">
        <span class="config-label">Tempo por dia</span>
        <select class="config-select" id="daily-minutes">
          <option value="30">30 min</option>
          <option value="60">1 hora</option>
          <option value="90">1h30</option>
          <option value="120">2 horas</option>
          <option value="180">3 horas+</option>
        </select>
      </label>
      <label class="config-field">
        <span class="config-label">Tamanho do bloco</span>
        <select class="config-select" id="session-minutes">
          <option value="15">15 min</option>
          <option value="25">25 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </label>
      <label class="config-field">
        <span class="config-label">Período</span>
        <select class="config-select" id="study-period">
          <option value="manha">Manhã</option>
          <option value="tarde">Tarde</option>
          <option value="noite">Noite</option>
          <option value="madrugada">Madrugada</option>
          <option value="variavel">Variável</option>
        </select>
      </label>
      <button class="btn btn-accent" onclick="recalculatePlan()">
        <i data-lucide="sparkles" style="width:14px;height:14px;"></i>
        Recalcular rota
      </button>
    </section>

    <section class="plan-radar" id="plan-radar"></section>

    <section class="plan-focus-grid">
      <section class="today-plan" id="today-plan"></section>
      <aside class="priority-queue" id="priority-queue"></aside>
    </section>

    <section class="week-panel">
      <div class="section-title">
        <div>
          <p class="section-kicker">Rota da semana</p>
          <h2>Distribuição dos próximos dias</h2>
        </div>
        <button class="btn btn-sm" onclick="clearStoredPlan()">Limpar plano salvo</button>
      </div>
      <div class="week-board" id="week-board"></div>
    </section>
  </main>
</div>

<script src="data/topicos.js"></script>
<script src="data/conquistas.js"></script>
<script src="data/conquista_toast.js"></script>
<script src="js/app.js"></script>
<script src="js/recommendation-engine.js"></script>
<script src="js/study-engine.js"></script>
<script src="js/learning-engine.js"></script>
<script>
const PLAN_DAY_LABELS = {
  '1': 'Seg',
  '2': 'Ter',
  '3': 'Qua',
  '4': 'Qui',
  '5': 'Sex',
  '6': 'Sab',
}

let currentPlan = null
const PLAN_VERSION = '1.0.0'
const SMART_PLAN_KEY = 'smart_weekly_plan_v3'

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}

function getPlanConfigFromUI() {
  return getStudyPlanConfig({
    dailyMinutes: Number(document.getElementById('daily-minutes').value),
    sessionMinutes: Number(document.getElementById('session-minutes').value),
    period: document.getElementById('study-period').value,
  })
}

function hydrateConfig() {
  const profile = getUserProfile()
  const daily = document.getElementById('daily-minutes')
  const session = document.getElementById('session-minutes')
  const period = document.getElementById('study-period')

  daily.value = String(profile.tempoDiaMin || 60)
  session.value = String(Number(store.get('focus_meta_min') || getMetaSessaoPadrao() || 30))
  if (![...session.options].some(opt => opt.value === session.value)) session.value = '30'
  period.value = profile.periodoEstudo || 'noite'

  ;[daily, session, period].forEach(input => {
    input.addEventListener('change', () => {
      saveUserProfile({
        tempoDiaMin: Number(daily.value),
        periodoEstudo: period.value,
      })
      store.set('focus_meta_min', Number(session.value))
      renderPlanPage(true)
    })
  })
}

function recalculatePlan() {
  renderPlanPage(true)
}

function getPlanSignature(config) {
  const profile = getUserProfile()

  return JSON.stringify({
    planVersion: PLAN_VERSION,
    learningVersion: typeof LEARNING_ENGINE_VERSION !== 'undefined' ? LEARNING_ENGINE_VERSION : null,
    dailyMinutes: Number(config.dailyMinutes),
    sessionMinutes: Number(config.sessionMinutes),
    period: config.period,
    focoMateria: profile.focoMateria,
    ritmoAtual: profile.ritmoAtual,
    formatoPreferido: profile.formatoPreferido,
    diasAteEnem: typeof getDiasAteEnem === 'function' ? getDiasAteEnem() : null,
    learningState: typeof getLearningStateSignature === 'function' ? getLearningStateSignature() : '',
  })
}

function renderPlanPage(forceNew = false) {
  const config = getPlanConfigFromUI()
  const signature = getPlanSignature(config)
  const savedPayload = store.get(SMART_PLAN_KEY)

  if (!forceNew && savedPayload?.signature === signature && savedPayload?.plan) {
    currentPlan = savedPayload.plan
  } else {
    currentPlan = generateSmartWeeklyPlan(config)
    store.set(SMART_PLAN_KEY, {
      signature,
      plan: currentPlan,
      generatedAt: new Date().toISOString(),
    })
  }

  const snapshot = typeof getLearningSnapshot === 'function' ? getLearningSnapshot(currentPlan) : null
  renderPlanRadar(config, snapshot)
  renderTodayPlan(currentPlan)
  renderWeekBoard(currentPlan)
  renderPriorityQueue(config, snapshot)
  if (typeof lucide !== 'undefined') lucide.createIcons()
}

function renderPlanRadar(config, snapshot = null) {
  const radar = snapshot?.progress
    ? {
      weak: snapshot.progress.weak,
      dueReviews: snapshot.progress.dueReviews,
      daysToExam: Math.max(0, daysBetweenStudy(new Date(), config.examDate)),
      unstarted: snapshot.progress.unstarted,
    }
    : getStudyPlanRadar(config)

  document.getElementById('plan-radar').innerHTML = `
    <article class="plan-radar-card weak">
      <span>Pontos fracos</span>
      <strong>${radar.weak}</strong>
      <small>Com evidência de erro ou dificuldade</small>
    </article>
    <article class="plan-radar-card review">
      <span>Revisões</span>
      <strong>${radar.dueReviews}</strong>
      <small>Pendentes para hoje</small>
    </article>
    <article class="plan-radar-card">
      <span>ENEM</span>
      <strong>${radar.daysToExam}</strong>
      <small>Dias até a prova</small>
    </article>
    <article class="plan-radar-card unstarted">
      <span>Sem estudo</span>
      <strong>${radar.unstarted}</strong>
      <small>Conteúdos ainda sem diagnóstico</small>
    </article>
  `
}

function renderTodayPlan(plan) {
  const todayKey = getTodayStudyKey()
  const sessions = plan[todayKey] || []
  const first = sessions[0]

  document.getElementById('today-plan').innerHTML = `
    <div class="today-header">
      <div>
        <span>Cronograma de hoje</span>
        <h2>${sessions.length} bloco${sessions.length !== 1 ? 's' : ''} recomendado${sessions.length !== 1 ? 's' : ''}</h2>
        ${sessions.length ? `<p class="priority-copy">${getTodayPlanSummary(sessions)}</p>` : ''}
      </div>
      ${first ? `
        <a class="btn btn-accent" href="${getTopicUrlFromStudyTopic(first)}">
          <i data-lucide="play" style="width:14px;height:14px;"></i>
          Começar primeiro bloco
        </a>
      ` : ''}
    </div>
    <div class="today-timeline">
      ${sessions.length ? sessions.map((session, index) => renderTodaySession(session, index)).join('') : `
        <p class="empty-plan">Nenhum bloco para hoje. Recalcule a rota ou ajuste seu tempo diário.</p>
      `}
    </div>
  `
}

function renderTodaySession(session, index) {
  const urgency = session.urgencyLevel || getUrgencyLevel(session.score)
  return `
    <article class="today-session">
      <div class="session-index">${index + 1}</div>
      <div class="session-content">
        <div class="session-meta">
          <span>${escapeHtml(session.inicio || '--')}</span>
          <span>${session.minutes} min</span>
          <span>${escapeHtml(session.matNome)}</span>
          <span class="urgency-chip ${urgency}">${formatUrgencyLabel(urgency)}</span>
        </div>
        <h3>${escapeHtml(session.titulo)}</h3>
        <p><strong>Por que agora?</strong> ${escapeHtml(session.reason)}</p>
        <div class="session-actions">
          <a class="btn btn-sm btn-accent" href="${getTopicUrlFromStudyTopic(session)}">Abrir tópico</a>
          <button class="btn btn-sm" onclick="postponeSession('${escapeHtml(session.topicId)}')">Adiar</button>
        </div>
      </div>
    </article>
  `
}

function getTodayPlanSummary(sessions) {
  const total = sessions.reduce((sum, session) => sum + Number(session.minutes || 0), 0)
  const materias = [...new Set(sessions.map(session => session.matNome).filter(Boolean))].slice(0, 3).join(' + ')
  return `Tempo estimado: ${total} min${materias ? ` · Foco: ${materias}` : ''}.`
}

function formatUrgencyLabel(scoreOrLevel) {
  const level = typeof scoreOrLevel === 'string' ? scoreOrLevel : getUrgencyLevel(scoreOrLevel)
  if (level === 'critica') return 'Crítica'
  if (level === 'alta') return 'Alta'
  if (level === 'media') return 'Média'
  if (level === 'prioritario') return 'Prioritário'
  return 'Baixa'
}

function renderWeekBoard(plan) {
  const todayKey = getTodayStudyKey()
  document.getElementById('week-board').innerHTML = Object.keys(PLAN_DAY_LABELS).map(dayKey => {
    const sessions = plan[dayKey] || []
    return `
      <div class="week-day ${dayKey === todayKey ? 'today' : ''}">
        <p class="week-day-name">${PLAN_DAY_LABELS[dayKey]}${dayKey === todayKey ? ' · hoje' : ''}</p>
        ${sessions.length ? sessions.map(session => `
          <a class="week-session" href="${getTopicUrlFromStudyTopic(session)}">
            <strong>${escapeHtml(session.titulo)}</strong>
            <span>${escapeHtml(session.matNome)} · ${session.minutes} min · ${formatUrgencyLabel(session.urgencyLevel || session.score)}</span>
          </a>
        `).join('') : '<p class="empty-plan">Livre</p>'}
      </div>
    `
  }).join('')

}

function getTopicUrlFromStudyTopic(sessionOrTopic) {
  return `topico.html?m=${encodeURIComponent(sessionOrTopic.materiaKey)}&id=${encodeURIComponent(sessionOrTopic.tKey)}`
}

function renderPriorityQueue(config, snapshot = null) {
  const recommendations = snapshot
    ? snapshot.topics
      .filter(item => item.score > -30)
      .sort((a, b) => b.score - a.score)
      .slice(0, 8)
    : getStudyRecommendations(8, config)

  document.getElementById('priority-queue').innerHTML = `
    <p class="section-kicker">Fila inteligente</p>
    <h2 style="font-size:17px;margin-top:4px;">Próximos da rota</h2>
    <p class="priority-copy">Conteúdos importantes pelo seu foco, revisões, erros, domínio e cobertura. A fila explica o motivo dominante.</p>
    <div class="priority-list">
      ${recommendations.map(item => `
        <a class="priority-item" href="${getTopicUrlFromStudyTopic(item.topic)}">
          <strong>${escapeHtml(item.topic.titulo)}</strong>
          <span>${escapeHtml(item.topic.matNome)} · ${formatUrgencyLabel(item.level || item.score)}</span>
          <small>Motivo: ${escapeHtml(item.dominantReason || item.reasons?.[0] || 'equilíbrio da rota')}</small>
        </a>
      `).join('')}
    </div>
  `
}

function postponeSession(topicId) {
  const state = getUserTopicState(topicId)
  saveUserTopicState(topicId, {
    ...state,
    skippedUntil: addDaysISO(1),
    postponedCount: Number(state.postponedCount || 0) + 1,
    lastPostponedAt: new Date().toISOString(),
  })
  renderPlanPage(true)
}

function clearStoredPlan() {
  if (!confirm('Limpar plano semanal salvo e recalcular?')) return
  localStorage.removeItem('smart_weekly_plan')
  localStorage.removeItem('smart_weekly_plan_v2')
  localStorage.removeItem(SMART_PLAN_KEY)
  renderPlanPage(true)
}

hydrateConfig()
renderPlanPage(false)
</script>
</body>
</html>
