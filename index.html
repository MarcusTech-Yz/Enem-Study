<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml">
  <title>ENEM · Estudar</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Tópico atual card ── */
    .topico-atual {
      background: var(--accent);
      color: #0F0F0F;
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .topico-atual::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(0,0,0,.06);
      border-radius: 50%;
    }
    .ta-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      opacity: .55; font-family: var(--mono); margin-bottom: 10px;
    }
    .ta-nome {
      font-size: 22px; font-weight: 600;
      letter-spacing: -.03em; line-height: 1.2; margin-bottom: 4px;
    }
    .ta-meta { font-size: 12px; opacity: .6; font-family: var(--mono); margin-bottom: 1.25rem; }
    .ta-acoes { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ta-btn-comecar {
      display: inline-flex; align-items: center; gap: 7px;
      background: #0F0F0F; color: var(--accent);
      border: none; border-radius: 8px;
      padding: 10px 20px; font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: opacity .15s;
      text-decoration: none;
    }
    .ta-btn-comecar:hover { opacity: .85; }
    .ta-btn-ver {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(15,15,15,.08); color: rgba(15,15,15,.72);
      border: 1px solid rgba(15,15,15,.12); border-radius: 8px;
      padding: 10px 16px; font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: all .15s;
      text-decoration: none;
    }
    .ta-btn-ver:hover { background: rgba(15,15,15,.12); color: #0F0F0F; }
    .ta-btn-pular {
      background: none; border: none;
      color: rgba(15,15,15,.5); font-size: 12px;
      font-family: var(--font); cursor: pointer;
      padding: 0; text-decoration: underline; text-underline-offset: 2px;
    }
    .ta-btn-pular:hover { color: rgba(15,15,15,.8); }

    /* ── Próximos ── */
    .proximos-label {
      font-size: 10px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 8px;
    }
    .proximo-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 6px;
      text-decoration: none; color: var(--text); transition: border-color .15s;
    }
    .proximo-item:hover { border-color: var(--border2); }
    .proximo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
    .proximo-link {
      display: flex; align-items: center; gap: 10px;
      min-width: 0; flex: 1; color: var(--text); text-decoration: none;
    }
    .proximo-nome { font-size: 13px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .proximo-mat  { font-size: 11px; color: var(--text3); font-family: var(--mono); }
    .proximo-focus {
      width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--accent); background: transparent; flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .proximo-focus:hover { background: var(--bg3); border-color: var(--accent); }

    /* ── Barra de progresso do dia ── */
    .dia-progresso {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 1.5rem;
    }
    .dia-prog-bar  { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .dia-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s ease; }
    .dia-prog-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .dia-prog-txt  { font-size: 12px; color: var(--text3); font-family: var(--mono); white-space: nowrap; transition: color .3s; }
    .dia-prog-txt.motivacao { color: var(--accent); }
    .dia-prog-tempo { font-size: 10px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(245,166,35,.09);
      border: 1px solid rgba(245,166,35,.22);
      color: var(--amber);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .streak-icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(245,166,35,.14);
      box-shadow: 0 0 18px rgba(245,166,35,.12);
      font-size: 14px;
    }
    .streak-label {
      display: block;
      font-size: 9px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: var(--mono);
      color: rgba(245,166,35,.72);
      margin-bottom: 3px;
    }
    .streak-pill strong {
      display: block;
      font-size: 12px;
      line-height: 1;
      color: var(--amber);
    }

    /* ── Alerta de pulos ── */
    .pulo-alerta {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    .pulo-alerta.show { display: block; }
    .pulo-alerta-titulo { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .pulo-alerta-sub { font-size: 12px; color: var(--text2); margin-bottom: 1rem; }
    .pulo-opcoes { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ══════════════════════════════════════════
       ONBOARDING EM ETAPAS
    ══════════════════════════════════════════ */
    .ob-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
    }

    /* Barra de progresso do onboarding */
    .ob-progress-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--border);
    }
    .ob-progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 0 2px 2px 0;
      transition: width .4s ease;
    }

    .ob-steps-dots {
      display: flex; gap: 6px; margin-bottom: 2rem;
    }
    .ob-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border2); transition: background .3s;
    }
    .ob-dot.ativo { background: var(--accent); }
    .ob-dot.feito { background: var(--accent); opacity: .4; }

    /* Cada step */
    .ob-step-panel {
      display: none;
      animation: obFadeIn .3s ease;
    }
    .ob-step-panel.ativo { display: block; }

    @keyframes obFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ob-eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--text3); font-family: var(--mono); margin-bottom: 8px;
    }
    .ob-titulo {
      font-size: 20px; font-weight: 600;
      letter-spacing: -.02em; margin-bottom: 6px;
    }
    .ob-sub {
      font-size: 13px; color: var(--text2); margin-bottom: 1.5rem;
    }
    .ob-opcoes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .ob-opt {
      padding: 8px 16px; border-radius: 8px;
      border: 1px solid var(--border2); background: none;
      color: var(--text2); font-size: 13px; font-family: var(--font);
      cursor: pointer; transition: all .15s;
    }
    .ob-opt:hover { color: var(--text); background: var(--bg3); }
    .ob-opt.selected {
      border-color: var(--accent); color: var(--accent);
      background: rgba(200,241,53,.08);
    }
    .ob-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .ob-btn-prox {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--accent); color: #0F0F0F;
      border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: opacity .15s;
    }
    .ob-btn-prox:hover { opacity: .85; }
    .ob-btn-prox:disabled { opacity: .35; cursor: default; }
    .ob-btn-voltar {
      background: none; border: none;
      color: var(--text3); font-size: 12px;
      font-family: var(--font); cursor: pointer;
      padding: 0; transition: color .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .ob-btn-voltar:hover { color: var(--text); }
    .ob-step-num {
      font-size: 11px; color: var(--text3); font-family: var(--mono);
    }

    /* ══════════════════════════════════════════
       TELA DE CONFIRMAÇÃO PÓS-PLANO
    ══════════════════════════════════════════ */
    .plano-confirmacao {
      background: var(--accent); color: #0F0F0F;
      border-radius: var(--radius); padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
    }
    .plano-confirmacao::before {
      content: '';
      position: absolute;
      bottom: -60px; right: -60px;
      width: 200px; height: 200px;
      background: rgba(0,0,0,.06);
      border-radius: 50%;
    }
    .pc-eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      opacity: .55; font-family: var(--mono); margin-bottom: 8px;
    }
    .pc-titulo {
      font-size: 22px; font-weight: 600;
      letter-spacing: -.03em; line-height: 1.2; margin-bottom: 6px;
    }
    .pc-resumo {
      font-size: 13px; opacity: .7; font-family: var(--mono); margin-bottom: 1.5rem;
    }
    .pc-stats {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.75rem;
    }
    .pc-stat {
      background: rgba(0,0,0,.12); border-radius: 8px;
      padding: 10px 14px;
    }
    .pc-stat-num { font-size: 20px; font-weight: 600; line-height: 1; }
    .pc-stat-lbl { font-size: 10px; opacity: .6; font-family: var(--mono); margin-top: 3px; text-transform: uppercase; letter-spacing: .08em; }
    .pc-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #0F0F0F; color: var(--accent);
      border: none; border-radius: 8px;
      padding: 11px 22px; font-size: 13px; font-weight: 600;
      font-family: var(--font); cursor: pointer; transition: opacity .15s;
    }
    .pc-btn:hover { opacity: .85; }
  </style>
</head>

          <p style="font-size:13px;font-weight:500;color:var(--amber);" id="streak-alerta-titulo"></p>
          <p style="font-size:11px;color:var(--text3);margin-top:2px;" id="streak-alerta-sub"></p>
        </div>
        <button onclick="document.getElementById('streak-alerta').style.display='none'"

    <!-- ════════════════════════════════

    <div id="estudo-section" style="display:none;">
      <div class="dia-progresso">
        <div class="dia-prog-bar">
          <div class="dia-prog-fill" id="dia-prog-fill"></div>

        <div class="dia-prog-info">

<script>
/* ─────────────────────────────────────────
   Saudação e data
───────────────────────────────────────── */
const agora = new Date()
document.getElementById('data-hoje').textContent =
  agora.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })

function getHomeGreeting() {
  const hour = new Date().getHours()
  const name = getGreetingName()

  if (hour < 12) return `Bom dia${name}. Bora começar?`
  if (hour < 18) return `Boa tarde${name}. Pronto para estudar?`
  return `Boa noite${name}. Uma última sessão?`
}

function updateHomeHeader(subtitle = '') {
  const subtitleEl = document.getElementById('page-subtitle')
  document.getElementById('saudacao').textContent = getHomeGreeting()

  if (!subtitleEl) return
  subtitleEl.textContent = subtitle
  subtitleEl.style.display = subtitle ? 'block' : 'none'
}

updateHomeHeader()

/* ─────────────────────────────────────────
   ONBOARDING OFICIAL
───────────────────────────────────────── */
const ONBOARDING_STEPS = [
  {
    key: 'nome',
    type: 'input',
    kicker: 'Passo 1 de 6',
    title: 'Como você quer ser chamado?',
    subtitle: 'Esse nome aparece nas mensagens, no perfil e nas conquistas.',

  {

    mascot: 'O melhor plano é aquele que você consegue repetir.',
    options: [
      { label: '30 min', value: 30, insight: 'Plano leve: 1 bloco principal por dia.' },
      { label: '1 hora', value: 60, insight: 'Plano equilibrado: 2 blocos por dia.' },
      { label: '2 horas', value: 120, insight: 'Plano intenso: tópicos + revisão.' },
      { label: '3 horas+', value: 180, insight: 'Plano avançado: ideal para uma rotina forte.' },
    ]
  },
  {
    key: 'focoMateria',

    kicker: 'Passo 4 de 6',

    mascot: 'Não precisa acertar perfeito. Você pode mudar isso depois.',
    options: [
      { label: 'Equilibrado', value: 'equilibrado', insight: 'Seu plano vai distribuir melhor entre as áreas.' },

    ]

  {

    mascot: 'Pronto. Agora o enem.study tem uma base para te guiar.'

let onboardingStepIndex = 0
let onboardingDraft = {
  ...getUserProfile(),
  enemAno: getUserProfile().enemAno || 2026,
  tempoDiaMin: getUserProfile().tempoDiaMin || 60,
  focoMateria: getUserProfile().focoMateria || 'equilibrado',
  ritmoAtual: getUserProfile().ritmoAtual || 'irregular',
  formatoPreferido: getUserProfile().formatoPreferido || 'misturado',
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;')
}

function escapeHtmlForAttr(value) {
  return escapeHtml(value)
}

function renderOnboarding() {
  const step = ONBOARDING_STEPS[onboardingStepIndex]
  const progress = Math.min(100, Math.round(((onboardingStepIndex + 1) / ONBOARDING_STEPS.length) * 100))
  const app = document.getElementById('onboarding-section')

  document.getElementById('saudacao').textContent = getOnboardingTitle()
  const subtitleEl = document.getElementById('page-subtitle')
  if (subtitleEl) {
    subtitleEl.textContent = 'Responda algumas perguntas rápidas para o enem.study se adaptar à sua rotina.'
    subtitleEl.style.display = 'block'
  }

  app.innerHTML = `
    <section class="ob-official">
      <div class="ob-card">
        <div class="ob-line">
          <span style="width:${progress}%"></span>
        </div>

        <div class="ob-content">
          <div class="ob-dots">
            ${ONBOARDING_STEPS.slice(0, -1).map((_, i) => `
              <span class="${i === onboardingStepIndex ? 'active' : i < onboardingStepIndex ? 'done' : ''}"></span>
            `).join('')}
          </div>

          <p class="ob-kicker">${step.kicker}</p>
          <h2>${step.title}</h2>
          <p class="ob-subtitle">${step.subtitle}</p>

          <div class="ob-answer">
            ${renderOnboardingAnswer(step)}
          </div>

          <div class="ob-nav">
            <button class="btn btn-ghost" onclick="prevOnboardingStep()" ${onboardingStepIndex === 0 ? 'style="visibility:hidden"' : ''}>
              Voltar
            </button>

            <button class="btn btn-accent" onclick="nextOnboardingStep()">
              ${step.type === 'final' ? 'Entrar no app' : 'Próximo'}
            </button>
          </div>
        </div>
      </div>
    </section>
  `

  if (typeof lucide !== 'undefined') lucide.createIcons()
}

function renderOnboardingAnswer(step) {
  if (step.type === 'input') {
    return `
      <input
        class="ob-input"
        placeholder="${step.placeholder || ''}"
        value="${escapeHtmlForAttr(onboardingDraft[step.key] || '')}"
        oninput="onboardingDraft.${step.key} = this.value"
      />

      <div class="ob-insight">
        <strong>Dica:</strong> use o nome que você quer ver na home e no perfil.
      </div>
    `
  }

  if (step.type === 'options') {
    const selected = onboardingDraft[step.key]
    const current = step.options.find(opt => opt.value === selected)

    return `
      <div class="ob-options">
        ${step.options.map(opt => `
          <button
            class="ob-option ${selected === opt.value ? 'selected' : ''}"
            onclick="selectOnboardingOption('${step.key}', '${String(opt.value)}')"
          >
            ${opt.label}
          </button>
        `).join('')}
      </div>

      ${current?.insight ? `
        <div class="ob-insight">
          <strong>Como isso muda seu plano:</strong> ${current.insight}
        </div>
      ` : ''}
    `
  }

  if (step.type === 'final') {
    return `
      <div class="ob-final">
        <p>Resumo inicial:</p>

        <ul>
          <li>Nome no app: <strong>${escapeHtml(onboardingDraft.nome || 'Estudante')}</strong></li>
          <li>ENEM: <strong>${escapeHtml(onboardingDraft.enemAno)}</strong></li>
          <li>Tempo por dia: <strong>${escapeHtml(formatTempoOnboarding(onboardingDraft.tempoDiaMin))}</strong></li>
          <li>Foco inicial: <strong>${escapeHtml(formatMateriaFoco(onboardingDraft.focoMateria))}</strong></li>
          <li>Ritmo atual: <strong>${escapeHtml(formatRitmo(onboardingDraft.ritmoAtual))}</strong></li>
          <li>Formato preferido: <strong>${escapeHtml(formatFormato(onboardingDraft.formatoPreferido))}</strong></li>
        </ul>
      </div>
    `
  }

  return ''
}

function selectOnboardingOption(key, value) {
  let parsedValue = value

  if (key === 'enemAno' || key === 'tempoDiaMin') {
    parsedValue = Number(value)
  }

  onboardingDraft[key] = parsedValue
  renderOnboarding()
}

function nextOnboardingStep() {
  const step = ONBOARDING_STEPS[onboardingStepIndex]

  if (step.key === 'nome' && !onboardingDraft.nome?.trim()) {
    onboardingDraft.nome = 'Estudante'
  }

  if (step.type === 'final') {
    finishOnboarding(onboardingDraft)
    updateHomeHeader()
    renderEstudo()
    return
  }

  onboardingStepIndex++
  renderOnboarding()
}

function prevOnboardingStep() {
  if (onboardingStepIndex <= 0) return
  onboardingStepIndex--
  renderOnboarding()
}

function getOnboardingTitle() {
  const name = onboardingDraft.nome?.trim()
  return name ? `Vamos montar seu plano, ${name}.` : 'Vamos montar seu plano.'
}

function formatTempoOnboarding(min) {
  if (min >= 180) return '3 horas+'
  if (min === 120) return '2 horas'
  if (min === 60) return '1 hora'
  return `${min} min`
}

function formatMateriaFoco(value) {
  const map = {
    equilibrado: 'Equilibrado',
    matematica: 'Matemática',
    portugues: 'Português',
    historia: 'História',
    geografia: 'Geografia',
    ciencias: 'Ciências da Natureza',
    redacao: 'Redação'
  }

  return map[value] || value
}

function formatRitmo(value) {
  const map = {
    recomecando: 'Recomeçando',
    irregular: 'Irregular',
    razoavel: 'Razoável',
    constante: 'Constante'
  }

  return map[value] || value
}

function formatFormato(value) {
  const map = {
    resumos: 'Resumos',
    questoes: 'Questões',
    videos: 'Vídeos',
    revisao: 'Revisão rápida',
    misturado: 'Misturado'
  }

  return map[value] || value
}

/* ─────────────────────────────────────────
   SUGESTÃO DE TÓPICOS
───────────────────────────────────────── */
function getSugestaoTopicos(n) {
  const result    = []
  const gradeHoje = getMateriaHoje()

  // Se tem grade configurada para hoje, usa ela
  if (gradeHoje.length > 0) {
    const keys = gradeHoje.map(m => m.key)
    for (const matKey of keys) {
      if (result.length >= n) break
      const mat    = ENEM[matKey]
      const feitos = getTopicosFeitos(matKey)
      if (!mat?.conteudos) continue
      for (const conteudo of mat.conteudos) {
        if (result.length >= n) break
        for (const h of conteudo.habilidades) {
          const tKey = `${conteudo.id}__${h.id}`
          if (!feitos.includes(tKey)) {
            result.push({ materiaKey: matKey, matNome: mat.nome, matIcone: mat.icone, tKey, texto: h.topico })
            break
          }
        }
      }
    }
    return result
  }

  // Sem grade: rotação balanceada priorizando matérias principais do ENEM
  // (não usa Object.keys em ordem — isso sempre entregava a mesma matéria)
  const profile = getUserProfile()
  const foco = profile.focoMateria
  const ROTACAO_PADRAO = ['matematica', 'portugues', 'historia', 'geografia', 'ciencias', 'filosofia', 'ingles']
  const todasKeys      = Object.keys(ENEM)
  // Garante que qualquer matéria nova no ENEM object apareça no final
  const rotacaoBase = [
    ...ROTACAO_PADRAO.filter(k => todasKeys.includes(k)),
    ...todasKeys.filter(k => !ROTACAO_PADRAO.includes(k) && k !== 'redacao')
  ]
  const rotacao = foco && foco !== 'equilibrado' && todasKeys.includes(foco)
    ? [foco, ...rotacaoBase.filter(k => k !== foco)]
    : rotacaoBase

  // Pega um tópico de cada matéria em sequência (round-robin)
  // para garantir variedade mesmo sem plano
  const candidatos = []
  for (const matKey of rotacao) {
    const mat    = ENEM[matKey]
    const feitos = getTopicosFeitos(matKey)
    if (!mat?.conteudos) continue
    for (const conteudo of mat.conteudos) {
      for (const h of conteudo.habilidades) {
        const tKey = `${conteudo.id}__${h.id}`
        if (!feitos.includes(tKey)) {
          candidatos.push({ materiaKey: matKey, matNome: mat.nome, matIcone: mat.icone, tKey, texto: h.topico, prioridade: h.prioridade })
          break // um por matéria por rodada
        }
      }
      break // um conteúdo por matéria
    }
  }

  // Preenche até n tópicos
  return candidatos.slice(0, n)
}

/* ─────────────────────────────────────────
   RENDER ESTUDO
───────────────────────────────────────── */
let pulados = []

function getQuantidadeTopicosHoje() {
  const tempo = Number(getUserProfile().tempoDiaMin || 60)

  if (tempo <= 30) return 1
  if (tempo <= 60) return 2
  if (tempo <= 120) return 4
  return 5
}

function getMsgProgresso(done, total) {
  if (done === 0)           return `Comece o primeiro!`
  if (done === 1)           return `1 feito! Você tá indo bem.`
  if (done < total - 1)    return `${done} feitos! Continue assim.`
  if (done === total - 1)  return `Falta 1 só, não para agora!`
  return `Dia completo 🎉`
}

function getStreakText(days) {
  if (!days || days <= 0) {
    return {
      label: 'Comece hoje',
      value: 'sem sequência'
    }
  }

  if (days === 1) {
    return {
      label: 'Você voltou hoje',
      value: '1 dia'
    }
  }

  if (days < 7) {
    return {
      label: 'Sequência ativa',
      value: `${days} dias`
    }
  }

  return {
    label: 'Ritmo forte',
    value: `${days} dias`
  }
}

function renderEstudo() {
  if (shouldShowOnboarding()) {
    renderOnboarding()
    document.getElementById('onboarding-section').style.display = 'block'
    document.getElementById('estudo-section').style.display     = 'none'
    document.getElementById('confirmacao-section').style.display = 'none'
    if (typeof lucide !== 'undefined') lucide.createIcons()
    return
  }

  updateHomeHeader()
  document.getElementById('onboarding-section').style.display  = 'none'
  document.getElementById('confirmacao-section').style.display  = 'none'
  document.getElementById('estudo-section').style.display      = 'block'

  const topicos   = getSugestaoTopicos(getQuantidadeTopicosHoje())
  const total     = Math.max(topicos.length, 1)
  const doneCount = topicos.filter(t => isTopicoFeito(t.materiaKey, t.tKey)).length

  // Barra e textos de progresso
  document.getElementById('dia-prog-fill').style.width = Math.round(doneCount / total * 100) + '%'

  const txtEl = document.getElementById('dia-prog-txt')
  txtEl.textContent = getMsgProgresso(doneCount, total)
  txtEl.classList.toggle('motivacao', doneCount > 0)

  // Tempo restante
  const restantes = total - doneCount
  const minRest   = restantes * 25
  const hRest     = Math.floor(minRest / 60)
  const mRest     = minRest % 60
  const tempoRestStr = restantes === 0
    ? 'sessão concluída'
    : hRest > 0
      ? `~${hRest}h${mRest > 0 ? mRest + 'min' : ''} restantes`
      : `~${mRest}min restantes`
  document.getElementById('dia-prog-tempo').textContent = tempoRestStr

  // Streak
  const streak = getStreak()
  const streakText = getStreakText(streak.count)
  document.getElementById('streak-badge').innerHTML = `
    <div class="streak-icon">🔥</div>
    <div>
      <strong>${streakText.value}</strong>
    </div>
  `

  // Tópico atual
  const atual = topicos.find(t =>
    !pulados.includes(t.tKey) &&
    !isTopicoFeito(t.materiaKey, t.tKey)
  )
  const atualWrap = document.getElementById('topico-atual-wrap')

  if (atual) {
    const focoUrl = `modo-foco.html?${new URLSearchParams({
      materiaKey: atual.materiaKey,
      tKey: atual.tKey,
      texto: atual.texto,
      matNome: atual.matNome,
    }).toString()}`
    const topicoUrl = `topico.html?m=${encodeURIComponent(atual.materiaKey)}&id=${encodeURIComponent(atual.tKey)}`
    atualWrap.innerHTML = `
      <div class="topico-atual">
        <p class="ta-label">Tópico atual</p>
        <p class="ta-nome">${atual.texto}</p>
        <p class="ta-meta">${atual.matNome} · ~25 min</p>
        <div class="ta-acoes">
          <a class="ta-btn-comecar" href="${focoUrl}">
            <i data-lucide="play" style="width:14px;height:14px;"></i>
            Iniciar sessão
          </a>
          <a class="ta-btn-ver" href="${topicoUrl}">
            <i data-lucide="external-link" style="width:14px;height:14px;"></i>
            Ver tópico
          </a>
          <button class="ta-btn-pular" onclick="pularTopico()">Pular para próximo</button>
        </div>
      </div>`
  } else {
    atualWrap.innerHTML = `
      <div class="topico-atual" style="background:var(--bg2);border:1px solid var(--accent);color:var(--text);">
        <p class="ta-label" style="color:var(--accent);opacity:1;">Dia concluído</p>
        <p class="ta-nome" style="font-size:20px;">🎉 Todos os tópicos feitos!</p>
        <p class="ta-meta" style="color:var(--text2);opacity:1;">Ótimo trabalho. Até amanhã.</p>
      </div>`
  }


  // Próximos
  const proximos = topicos.filter(t =>
    t !== atual &&
    !pulados.includes(t.tKey) &&
    !isTopicoFeito(t.materiaKey, t.tKey)
  ).slice(0, 3)

  document.getElementById('proximos-wrap').innerHTML = proximos.length > 0 ? `
    <p class="proximos-label">Depois desse:</p>
    ${proximos.map(t => {
      const focoUrl = `modo-foco.html?${new URLSearchParams({
        materiaKey: t.materiaKey,
        tKey: t.tKey,
        texto: t.texto,
        matNome: t.matNome,
      }).toString()}`
      const topicoUrl = `topico.html?m=${encodeURIComponent(t.materiaKey)}&id=${encodeURIComponent(t.tKey)}`
      return `
        <div class="proximo-item">
          <a class="proximo-link" href="${topicoUrl}">
            <div class="proximo-dot"></div>
            <span class="proximo-nome">${t.texto}</span>
            <span class="proximo-mat">${t.matNome}</span>
          </a>
          <a class="proximo-focus" href="${focoUrl}" title="Iniciar sessão" aria-label="Iniciar sessão">
            <i data-lucide="play" style="width:14px;height:14px;"></i>
          </a>
        </div>`
    }).join('')}` : ''

  // Alerta de pulos
  const alertaEl = document.getElementById('pulo-alerta')
  if (pulados.length >= 2 && atual) {
    alertaEl.classList.add('show')
  } else {
    alertaEl.classList.remove('show')
  }

  lucide.createIcons()
}

/* ─────────────────────────────────────────
   PULAR / MUDAR MATÉRIA
───────────────────────────────────────── */
function pularTopico() {
  const topicos = getSugestaoTopicos(4)
  const atual = topicos.find(t =>
    !pulados.includes(t.tKey) &&
    !isTopicoFeito(t.materiaKey, t.tKey)
  )
  if (atual) pulados.push(atual.tKey)
  renderEstudo()
}

function escolherOutroTopico() {
  window.location.href = 'materias.html'
}

function descartarAlerta() {
  document.getElementById('pulo-alerta').classList.remove('show')
}

function comecarFoco(materiaKey, tKey, texto, matNome) {
  const params = new URLSearchParams({ materiaKey, tKey, texto, matNome })
  window.location.href = 'modo-foco.html?' + params.toString()
}

/* ─────────────────────────────────────────
   ALERTA DE STREAK
───────────────────────────────────────── */
function verificarAlertaStreak() {
  const streak = getStreak()
  if (streak.count < 1) return

  const ontem = new Date(Date.now() - 86400000).toISOString().slice(0, 10)
  if (streak.lastDate !== ontem) return // já estudou hoje ou streak quebrou

  const agora     = new Date()
  const meianoite = new Date(agora)
  meianoite.setHours(24, 0, 0, 0)
  const horasRest = Math.floor((meianoite - agora) / 3600000)
  const minRest   = Math.floor(((meianoite - agora) % 3600000) / 60000)
  const tempoStr  = horasRest > 0
    ? `${horasRest}h${minRest > 0 ? minRest + 'min' : ''}`
    : `${minRest} minutos`

  document.getElementById('streak-alerta-titulo').textContent =
    `Seu streak de ${streak.count} dia${streak.count !== 1 ? 's' : ''} acaba em ${tempoStr}!`
  document.getElementById('streak-alerta-sub').textContent =
    'Estude qualquer tópico hoje para manter sua sequência.'
  document.getElementById('streak-alerta').style.display = 'block'
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
renderEstudo()
verificarAlertaStreak()
</script>
