<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEM · Matérias</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span></span> enem.study</div>
    <nav>
      <p class="nav-label">Menu</p>
      <ul class="nav-links">
        <li><a href="index.html"><i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard</a></li>
        <li><a href="hoje.html"><i data-lucide="play-circle" class="nav-icon"></i> Estudar Hoje</a></li>
        <li><a href="grade.html"><i data-lucide="calendar-days" class="nav-icon"></i> Grade Semanal</a></li>
        <li><a href="materias.html"><i data-lucide="book-open" class="nav-icon"></i> Matérias</a></li>
        <li><a href="exportar.html"><i data-lucide="download" class="nav-icon"></i> Exportar</a></li>
        <li><a href="perfil.html"><i data-lucide="trophy" class="nav-icon"></i> Perfil</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <p class="date-tag">Conteúdo</p>
      <h1>Matérias</h1>
      <p>Clique em uma matéria para ver tópicos, anotações e materiais.</p>
    </div>
    <div class="materias-grid" id="materias-grid"></div>
  </main>
</div>

<script src="data/topicos.js"></script>
<script src="js/app.js"></script>
<script>
  const grid = document.getElementById('materias-grid')

  for (const [key, mat] of Object.entries(ENEM)) {
    const { feitos, total, pct } = getProgressoMateria(key)
    const corBarra = pct < 30 ? 'var(--red)' : pct < 60 ? 'var(--amber)' : 'var(--accent)'
    const dific    = getDificuldades(key)
    const fracos   = Object.values(dific).filter(v => v === 1).length
    const tempo    = getTempoMateria(key)

    grid.innerHTML += `
      <a href="materia.html?m=${key}" class="materia-card">
        <i data-lucide="${mat.icone}" style="width:22px;height:22px;color:var(--text3);margin-bottom:12px;display:block;"></i>
        <div class="materia-card-nome">${mat.nome}</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%;background:${corBarra};"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <p class="progress-label">${pct}% · ${feitos}/${total}</p>
          <div style="display:flex;gap:8px;align-items:center;">
            ${tempo > 0 ? `<span style="font-size:10px;color:var(--blue);font-family:var(--mono);">${formatTempo(tempo)}</span>` : ''}
            ${fracos > 0 ? `<span style="font-size:10px;color:var(--red);font-family:var(--mono);">${fracos} fraco${fracos>1?'s':''}</span>` : ''}
          </div>
        </div>
      </a>
    `
  }

  lucide.createIcons()
</script>
</body>
</html>
