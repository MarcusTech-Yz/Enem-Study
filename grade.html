<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENEM · Grade Semanal</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span></span> enem.study</div>
    <nav>
      <p class="nav-label">Menu</p>
      <ul class="nav-links">
        <li><a href="index.html"><i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard</a></li>
        <li><a href="hoje.html"><i data-lucide="play-circle" class="nav-icon"></i> Estudar Hoje</a></li>
        <li><a href="grade.html"><i data-lucide="calendar-days" class="nav-icon"></i> Grade Semanal</a></li>
        <li><a href="materias.html"><i data-lucide="book-open" class="nav-icon"></i> Matérias</a></li>
        <li><a href="exportar.html"><i data-lucide="download" class="nav-icon"></i> Exportar</a></li>
        <li><a href="perfil.html"><i data-lucide="trophy" class="nav-icon"></i> Perfil</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <p class="date-tag">Planejamento</p>
      <h1>Grade Semanal</h1>
      <p>Organize qual matéria estudar em cada dia, com horário e duração.</p>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;">
      <button class="btn btn-accent" onclick="sugestaoAutomatica()">
        <i data-lucide="sparkles" style="width:14px;height:14px;"></i> Sugestão automática
      </button>
      <button class="btn" onclick="limparTudo()">Limpar tudo</button>
    </div>

    <div class="grade-grid" id="grade-grid"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-titulo">Adicionar matéria</h3>
    <div class="form-row">
      <label class="form-label">Matéria</label>
      <select id="modal-materia"></select>
    </div>
    <div class="form-row form-inline">
      <div>
        <label class="form-label">Início</label>
        <input type="time" id="modal-inicio" value="14:00" />
      </div>
      <div>
        <label class="form-label">Duração (min)</label>
        <input type="number" id="modal-duracao" value="90" min="15" max="300" step="15" />
      </div>
    </div>
    <div class="conflict-warn" id="conflict-warn">⚠ Conflito de horário com outra matéria nesse dia.</div>
    <div class="modal-btns">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="salvarMateria()">Adicionar</button>
    </div>
  </div>
</div>

<script src="data/topicos.js"></script>
<script src="js/app.js"></script>
<script src="js/grade.js"></script>
</body>
</html>
